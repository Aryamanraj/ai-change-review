name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run lint
      - run: npm test
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: ai-change-review-vsix
          path: ai-change-review-*.vsix
